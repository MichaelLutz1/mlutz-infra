apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/MichaelLutz1/mlutz-infra.git
    targetRevision: main
    path: apps/cloudflared

  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared

  syncPolicy: null
