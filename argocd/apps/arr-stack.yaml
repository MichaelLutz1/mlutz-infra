apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/MichaelLutz1/mlutz-infra.git
    targetRevision: main
    path: apps/arr-stack

  destination:
    server: https://kubernetes.default.svc
    namespace: arr-stack

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
