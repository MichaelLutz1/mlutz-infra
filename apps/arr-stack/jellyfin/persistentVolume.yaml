apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-pv
  namespace: arr-stack
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: jellyfin-media
  local:
    path: /home/lutzy/media
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - optiplex
---
